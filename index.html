<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的导航</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div>
          <h1 id="site-title">猫冬吧</h1>
          <p id="site-description">把你的收藏夹整理成清爽的导航页</p>
        </div>
        <div class="header-actions">
          <label class="search">
            <span class="sr-only">搜索</span>
            <input id="search-input" type="search" placeholder="搜索标题、描述或标签" />
          </label>
          <input id="bookmark-file" type="file" accept=".html,.htm" hidden />
          <button id="toggle-all" class="ghost-button push-right" type="button">顶层</button>
          <span id="stats" class="stats stats-inline"></span>
          <button id="open-admin" class="ghost-button" type="button">管理</button>
          <button id="upload-bookmarks" class="ghost-button" type="button">更换书签</button>
          <button id="clear-search" class="ghost-button" type="button">清除</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section id="tag-filters" class="tag-filters"></section>
      <section id="groups" class="groups"></section>
    </main>

    <div id="link-tooltip" class="link-tooltip hidden"></div>

    <aside id="admin-panel" class="admin-panel hidden">
      <div class="admin-header">
        <h2>管理</h2>
        <button id="close-admin" class="ghost-button" type="button">关闭</button>
      </div>
      <div class="admin-body">
        <section class="admin-section">
          <h3>文件夹</h3>
          <div class="admin-row">
            <input id="new-folder-name" type="text" placeholder="新文件夹名称" />
            <button id="add-folder" class="ghost-button" type="button">添加到当前层级</button>
          </div>
          <div class="admin-row">
            <input id="rename-folder-name" type="text" placeholder="当前文件夹新名称" />
            <button id="rename-folder" class="ghost-button" type="button">重命名</button>
            <button id="delete-folder" class="ghost-button danger" type="button">删除</button>
          </div>
          <div class="admin-row">
            <select id="move-folder-target"></select>
            <button id="move-folder" class="ghost-button" type="button">移动当前文件夹</button>
          </div>
          <div id="folder-order" class="admin-list"></div>
        </section>

        <section class="admin-section">
          <h3>网址</h3>
          <div class="admin-row">
            <input id="new-link-title" type="text" placeholder="标题" />
            <input id="new-link-url" type="url" placeholder="网址（https://）" />
            <button id="add-link" class="ghost-button" type="button">添加到当前层级</button>
          </div>
          <div class="admin-row">
            <select id="move-link-item"></select>
            <select id="move-link-target"></select>
            <button id="move-link" class="ghost-button" type="button">移动网址</button>
          </div>
          <div id="link-list" class="admin-list"></div>
        </section>

        <section class="admin-section">
          <h3>配色</h3>
          <div class="admin-row">
            <label>页面背景 <input id="color-page" type="color" /></label>
            <label>分栏背景 <input id="color-column" type="color" /></label>
            <label>文件夹背景 <input id="color-folder" type="color" /></label>
            <label>网址背景 <input id="color-link" type="color" /></label>
          </div>
        </section>

        <section class="admin-section">
          <h3>书签</h3>
          <div class="admin-row">
            <button id="export-bookmarks" class="ghost-button" type="button">导出书签 HTML</button>
          </div>
        </section>
      </div>
    </aside>

    <template id="link-card-template">
      <a class="link-card" target="_blank" rel="noopener noreferrer">
        <span class="link-title"></span>
        <span class="link-url"></span>
      </a>
    </template>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
